<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Cleaner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    #topbar {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      flex-shrink: 0;
    }
    #back { color: #999; text-decoration: none; font-size: 13px; }
    #back:hover { color: #333; }
    #topbar h1 { font-size: 16px; font-weight: 600; color: #333; }
    #settings-btn {
      margin-left: auto;
      padding: 7px 16px;
      background: #4a5568;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    #settings-btn:hover { background: #2d3748; }
    #status {
      font-size: 12px;
      color: #888;
      margin-left: 12px;
    }

    /* ── Editor area ── */
    #editor-wrap {
      flex: 1;
      display: flex;
      padding: 20px;
      gap: 20px;
      min-height: 0;
    }
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .panel-label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .editor-box {
      flex: 1;
      background: #fff;
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 24px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: #222;
      overflow-y: auto;
      outline: none;
      min-height: 300px;
    }
    .editor-box:empty::before {
      color: #aaa;
      pointer-events: none;
    }
    #editor-left:empty::before {
      content: 'Paste plain-text URLs here. They will be linkified and cleaned.';
    }
    #editor-right:empty::before {
      content: 'Paste HTML with links here. Titles will be cleaned and publishers appended.';
    }
    .editor-box:focus { border-color: #4a90d9; }
    .editor-box a {
      color: #1a73e8;
      text-decoration: underline;
    }

    /* ── Settings modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: #fff;
      border-radius: 12px;
      width: calc(100% - 40px);
      height: calc(100vh - 40px);
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    #modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #modal-header h2 { font-size: 18px; font-weight: 600; color: #333; }
    #modal-close {
      background: none; border: none; font-size: 24px;
      color: #999; cursor: pointer; padding: 4px 8px;
    }
    #modal-close:hover { color: #333; }
    #modal-body {
      flex: 1;
      overflow: hidden;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    /* ── Settings content ── */
    .settings-desc {
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .settings-desc code {
      background: #f0f0f0;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
    }
    #config-input {
      width: 100%;
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
    }
    #config-input:focus { outline: none; border-color: #4a90d9; }

    #modal-footer {
      padding: 16px 24px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }
    #save-settings-btn {
      padding: 8px 24px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    #save-settings-btn:hover { background: #1557b0; }
    .footer-left { display: flex; gap: 8px; margin-right: auto; }
    .footer-left button {
      padding: 8px 16px;
      background: #f0f0f0;
      color: #555;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .footer-left button:hover { background: #e0e0e0; color: #333; }
  </style>
</head>
<body>

  <div id="topbar">
    <a id="back" href="../index.html">&larr; Back</a>
    <h1>Link Cleaner</h1>
    <span id="status"></span>
    <button id="settings-btn">Settings</button>
  </div>

  <div id="editor-wrap">
    <div class="panel">
      <div class="panel-label">URL Linkifier</div>
      <div id="editor-left" class="editor-box" contenteditable="true"></div>
    </div>
    <div class="panel">
      <div class="panel-label">Title Cleaner</div>
      <div id="editor-right" class="editor-box" contenteditable="true"></div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="modal-overlay">
    <div id="modal">
      <div id="modal-header">
        <h2>Settings</h2>
        <button id="modal-close">&times;</button>
      </div>
      <div id="modal-body">
        <p class="settings-desc">
          <strong>Line 1:</strong> Publisher names to strip from titles, separated by <code>,,,</code>. Each name is automatically matched with separators (<code>|</code> <code>-</code> <code>&ndash;</code> <code>&mdash;</code> <code>\</code>) and case variants.<br>
          <strong>Remaining lines:</strong> Domain mappings as <code>domain=Name</code> (e.g. <code>nytimes.com=NYT</code>).
        </p>
        <textarea id="config-input" spellcheck="false"></textarea>
      </div>
      <div id="modal-footer">
        <div class="footer-left">
          <button id="reset-defaults-btn">Reset to defaults</button>
          <button id="clear-cache-btn">Clear all & reset</button>
        </div>
        <button id="save-settings-btn">Save &amp; Close</button>
      </div>
    </div>
  </div>

<script>
// ── Settings persistence ──
const DEFAULT_CONFIG = `The New York Times,,,NYT,,,The Washington Post,,,Washington Post,,,The Guardian,,,BBC News,,,BBC,,,Reuters,,,AP News,,,The Associated Press,,,Bloomberg,,,Financial Times,,,FT,,,The Wall Street Journal,,,WSJ,,,POLITICO,,,Politico,,,The Atlantic,,,The Verge,,,Ars Technica,,,Wired,,,WIRED,,,TechCrunch,,,MIT Technology Review,,,The Information,,,Axios,,,Time,,,TIME,,,The Economist,,,NPR,,,Vox,,,404 Media,,,Semafor,,,The Register,,,Fortune,,,CNBC,,,CNN,,,NBC News,,,CBS News,,,ABC News,,,Los Angeles Times,,,The Hill,,,Slate,,,Slate Magazine,,,New Scientist,,,Nature,,,Science,,,Science | AAAS,,,The New Yorker,,,ProPublica,,,Rest of World,,,Foreign Affairs,,,Foreign Policy,,,The Intercept,,,The Daily Beast,,,Quartz,,,Business Insider,,,Insider,,,MarketWatch,,,Yahoo News,,,Yahoo Finance,,,HuffPost,,,BuzzFeed News,,,Engadget,,,Gizmodo,,,Mashable,,,ZDNet,,,PCMag,,,Tom's Hardware,,,AnandTech,,,VentureBeat,,,Protocol,,,Motherboard,,,IEEE Spectrum,,,Google DeepMind,,,DeepMind,,,Google AI,,,Google,,,The Keyword,,,OpenAI,,,Anthropic,,,Meta AI,,,Meta,,,Microsoft Research,,,Microsoft,,,Google Research
nytimes.com=NYT
washingtonpost.com=WaPo
theguardian.com=Guardian
bbc.com=BBC
bbc.co.uk=BBC
reuters.com=Reuters
apnews.com=AP
bloomberg.com=Bloomberg
ft.com=FT
wsj.com=WSJ
politico.com=Politico
politico.eu=Politico
theatlantic.com=Atlantic
theverge.com=Verge
arstechnica.com=Ars Technica
wired.com=Wired
techcrunch.com=TechCrunch
technologyreview.com=MIT Tech Review
theinformation.com=The Information
axios.com=Axios
time.com=Time
economist.com=Economist
npr.org=NPR
vox.com=Vox
404media.co=404 Media
semafor.com=Semafor
theregister.com=The Register
fortune.com=Fortune
cnbc.com=CNBC
cnn.com=CNN
nbcnews.com=NBC
cbsnews.com=CBS
abcnews.go.com=ABC
latimes.com=LA Times
thehill.com=The Hill
slate.com=Slate
newscientist.com=New Scientist
nature.com=Nature
science.org=Science
newyorker.com=New Yorker
propublica.org=ProPublica
restofworld.org=Rest of World
foreignaffairs.com=Foreign Affairs
foreignpolicy.com=Foreign Policy
theintercept.com=The Intercept
thedailybeast.com=Daily Beast
qz.com=Quartz
businessinsider.com=BI
marketwatch.com=MarketWatch
news.yahoo.com=Yahoo
finance.yahoo.com=Yahoo Finance
huffpost.com=HuffPost
engadget.com=Engadget
gizmodo.com=Gizmodo
mashable.com=Mashable
zdnet.com=ZDNet
pcmag.com=PCMag
tomshardware.com=Tom's Hardware
venturebeat.com=VentureBeat
spectrum.ieee.org=IEEE Spectrum
deepmind.google=DeepMind
blog.google=Google
ai.google=Google AI
openai.com=OpenAI
anthropic.com=Anthropic
ai.meta.com=Meta AI
about.fb.com=Meta
research.microsoft.com=Microsoft Research
blogs.microsoft.com=Microsoft
research.google=Google Research`;

const SEPARATORS = ['|', '-', '\u2013', '\u2014', '\\'];

function buildSuffixes(names) {
  const suffixes = [];
  for (const name of names) {
    suffixes.push(name);
    const upper = name.toUpperCase();
    if (upper !== name) suffixes.push(upper);
    for (const sep of SEPARATORS) {
      suffixes.push(` ${sep} ${name}`);
      suffixes.push(` ${sep} ${upper}`);
      suffixes.push(`${sep} ${name}`);
      suffixes.push(`${sep} ${upper}`);
    }
  }
  suffixes.sort((a, b) => b.length - a.length);
  return suffixes;
}

function parseConfig(text) {
  const lines = text.split('\n');
  const names = (lines[0] || '')
    .split(',,,')
    .map(s => s.trim())
    .filter(Boolean);
  const mappings = lines.slice(1)
    .map(line => line.trim())
    .filter(line => line && line.includes('='))
    .map(line => {
      const idx = line.indexOf('=');
      return { domain: line.slice(0, idx).trim(), name: line.slice(idx + 1).trim() };
    });
  return { names, mappings };
}

function loadConfig() {
  return localStorage.getItem('link-cleaner-config') || DEFAULT_CONFIG;
}

function saveConfig(text) {
  localStorage.setItem('link-cleaner-config', text);
}

let configText = loadConfig();

// ── Settings modal UI ──
const overlay = document.getElementById('modal-overlay');
const configInput = document.getElementById('config-input');

function openSettings() {
  configInput.value = configText;
  overlay.classList.add('open');
}

function closeSettings() {
  overlay.classList.remove('open');
}

document.getElementById('save-settings-btn').addEventListener('click', () => {
  configText = configInput.value;
  saveConfig(configText);
  closeSettings();
});

document.getElementById('settings-btn').addEventListener('click', openSettings);
document.getElementById('modal-close').addEventListener('click', closeSettings);
overlay.addEventListener('click', e => { if (e.target === overlay) closeSettings(); });

document.getElementById('reset-defaults-btn').addEventListener('click', () => {
  configInput.value = DEFAULT_CONFIG;
});

document.getElementById('clear-cache-btn').addEventListener('click', () => {
  localStorage.removeItem('link-cleaner-config');
  configText = DEFAULT_CONFIG;
  configInput.value = configText;
  document.getElementById('clear-cache-btn').textContent = 'Cleared!';
  setTimeout(() => {
    document.getElementById('clear-cache-btn').textContent = 'Clear all & reset';
  }, 1500);
});

// ── Shared utilities ──
function stripUtmParams(url) {
  try {
    const u = new URL(url);
    const keysToRemove = [...u.searchParams.keys()].filter(k =>
      k.startsWith('utm_') || k.startsWith('ref_')
    );
    keysToRemove.forEach(k => u.searchParams.delete(k));
    return u.toString();
  } catch {
    return url;
  }
}

function cleanTitle(rawTitle) {
  const { names, mappings } = parseConfig(configText);
  const mappingNames = mappings.map(m => m.name).filter(Boolean);
  const allNames = [...new Set([...names, ...mappingNames])];
  const suffixes = buildSuffixes(allNames);
  let title = rawTitle;
  for (const suffix of suffixes) {
    if (title.endsWith(suffix)) {
      title = title.slice(0, -suffix.length);
      title = title.replace(/[\s|\u2013\u2014\-\\]+$/, '');
      break;
    }
  }
  return title.trim();
}

function getPublicationLabel(url) {
  let hostname;
  try { hostname = new URL(url).hostname; } catch { return 'TODO ' + url; }
  const { mappings } = parseConfig(configText);
  for (const m of mappings) {
    if (hostname === m.domain || hostname.endsWith('.' + m.domain)) {
      return m.name || null;
    }
  }
  const domain = hostname.replace(/^www\./, '');
  return 'TODO ' + domain;
}

// ── LEFT panel: URL Linkifier ──
const editorLeft = document.getElementById('editor-left');
const statusEl = document.getElementById('status');
const URL_RE = /https?:\/\/[^\s<>"')\]]+/g;

editorLeft.addEventListener('paste', e => {
  const html = e.clipboardData.getData('text/html');
  const plain = e.clipboardData.getData('text/plain');

  e.preventDefault();
  document.execCommand('insertHTML', false, html || plain);

  // Linkify bare URLs in text nodes
  const walker = document.createTreeWalker(editorLeft, NodeFilter.SHOW_TEXT);
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);

  let count = 0;
  for (const node of textNodes) {
    if (node.parentElement.closest('a')) continue;
    const text = node.textContent;
    if (!URL_RE.test(text)) continue;
    URL_RE.lastIndex = 0;

    const frag = document.createDocumentFragment();
    let lastIdx = 0;
    let match;
    while ((match = URL_RE.exec(text)) !== null) {
      if (match.index > lastIdx) {
        frag.appendChild(document.createTextNode(text.slice(lastIdx, match.index)));
      }
      const cleanUrl = stripUtmParams(match[0].replace(/\s+$/, ''));
      const a = document.createElement('a');
      a.href = cleanUrl;
      a.textContent = cleanUrl;
      frag.appendChild(a);
      count++;
      lastIdx = URL_RE.lastIndex;
    }
    if (lastIdx < text.length) {
      frag.appendChild(document.createTextNode(text.slice(lastIdx)));
    }
    node.parentNode.replaceChild(frag, node);
  }

  // Also strip UTM from any existing <a> tags that were pasted as HTML
  for (const a of editorLeft.querySelectorAll('a[href]')) {
    const url = stripUtmParams(a.href.replace(/\s+$/, ''));
    a.href = url;
    count++;
  }

  if (count) statusEl.textContent = `Linkified ${count} URL(s)`;
});

// ── RIGHT panel: Title Cleaner ──
const editorRight = document.getElementById('editor-right');

editorRight.addEventListener('paste', e => {
  const html = e.clipboardData.getData('text/html');
  if (!html) return;

  e.preventDefault();
  document.execCommand('insertHTML', false, html);

  const links = Array.from(editorRight.querySelectorAll('a[href]'));
  const httpLinks = links.filter(a =>
    a.href.startsWith('http://') || a.href.startsWith('https://')
  );

  if (httpLinks.length === 0) return;

  for (const a of httpLinks) {
    // Strip UTM params
    const url = stripUtmParams(a.href.replace(/\s+$/, ''));
    a.href = url;

    // Clean up the link title text
    a.textContent = cleanTitle(a.textContent.trim());

    // Ensure there's a space after the link
    if (a.nextSibling && a.nextSibling.nodeType === Node.TEXT_NODE) {
      if (!a.nextSibling.textContent.startsWith(' ')) {
        a.nextSibling.textContent = ' ' + a.nextSibling.textContent;
      }
    } else {
      a.insertAdjacentText('afterend', ' ');
    }

    // Add publication label in parentheses
    const label = getPublicationLabel(url);
    if (label) {
      const span = document.createElement('span');
      span.textContent = `(${label})`;
      a.nextSibling.after(span);
    }
  }

  statusEl.textContent = `Cleaned ${httpLinks.length} link(s)`;
});
</script>
</body>
</html>
