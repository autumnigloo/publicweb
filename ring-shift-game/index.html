<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ring Shift Game</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(8, 17, 31, 0.72);
      --panel-strong: rgba(6, 13, 24, 0.92);
      --line: rgba(152, 202, 255, 0.18);
      --text: #e8f0ff;
      --muted: #96aeca;
      --accent: #fbbf24;
      --accent-soft: rgba(251, 191, 36, 0.18);
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 15%, rgba(72, 196, 255, 0.14), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(255, 166, 77, 0.18), transparent 24%),
        linear-gradient(180deg, #12223a 0%, #08111f 45%, #050a14 100%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    #app {
      width: min(1500px, 100vw);
      min-height: 100vh;
      padding: 28px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 22px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 80px var(--shadow);
    }

    #hud {
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    #hud::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(140deg, rgba(255,255,255,0.06), transparent 40%),
        radial-gradient(circle at 15% 10%, rgba(91, 192, 255, 0.16), transparent 36%);
      pointer-events: none;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #7aa8d8;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1;
      font-weight: 600;
    }

    #subcopy {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      margin: 0;
    }

    #hud-top {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 4px 4px 0;
    }

    #dial-shell {
      position: relative;
      z-index: 1;
      min-height: 0;
      flex: 1 1 auto;
      overflow: auto;
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: rgba(251, 191, 36, 0.5) transparent;
    }

    #dial-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dial-row {
      border: 1px solid rgba(152, 202, 255, 0.12);
      border-radius: 14px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.03);
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      scroll-margin: 64px;
    }

    .dial-row.selected {
      transform: translateX(4px);
      border-color: rgba(251, 191, 36, 0.46);
      background: var(--accent-soft);
    }

    .dial-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 0;
    }

    .dial-name {
      font-size: 16px;
      letter-spacing: 0.04em;
    }

    .dial-value {
      font-size: 30px;
      line-height: 1;
      min-width: 1ch;
      text-align: right;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .dial-desc {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
      margin-top: 4px;
    }

    #status {
      border-radius: 14px;
      padding: 10px 12px;
      background: var(--panel-strong);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      position: relative;
      z-index: 1;
    }

    #status strong {
      color: var(--text);
      display: block;
      margin-bottom: 4px;
    }

    #status.solved {
      border-color: rgba(129, 231, 164, 0.45);
      color: #bbf7d0;
      background: rgba(12, 34, 25, 0.92);
    }

    #stage {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18px;
      min-width: 0;
    }

    #legend {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      padding: 16px;
    }

    .legend-card {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .legend-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
    }

    .legend-card span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    #canvas-grid {
      display: grid;
      grid-template-columns: minmax(240px, 0.78fr) minmax(380px, 1fr);
      gap: 18px;
      min-height: 0;
    }

    .canvas-card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 16px;
      min-height: 0;
    }

    .canvas-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .canvas-head strong {
      font-size: 18px;
      letter-spacing: 0.04em;
    }

    .canvas-head span {
      color: var(--muted);
      font-size: 13px;
    }

    canvas {
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        rgba(0, 0, 0, 0.24);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    #output-card {
      position: relative;
      overflow: hidden;
    }

    #output-card::after {
      content: "";
      position: absolute;
      inset: auto -12% -20% auto;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(251, 191, 36, 0.18), transparent 65%);
      pointer-events: none;
      filter: blur(10px);
    }

    @media (max-width: 1080px) {
      body {
        overflow: auto;
      }

      #app {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      #legend,
      #canvas-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="hud" class="panel">
      <div id="hud-top">
        <div class="eyebrow">Ring Shift Puzzle</div>
        <h1>Dial it back into phase.</h1>
        <p id="subcopy">Press `1` to `9` to generate a fresh level with that many transforms.</p>
      </div>
      <div id="dial-shell">
        <div id="dial-list"></div>
      </div>
      <div id="status">
        <strong>Controls</strong>
        Up/Down selects. Left/Right changes the digit. Number keys create a new level.
      </div>
    </aside>

    <main id="stage">
      <section id="legend" class="panel"></section>
      <section id="canvas-grid">
        <div class="canvas-card panel">
          <div class="canvas-head">
            <strong>Reference</strong>
            <span>Generated rainbow ring image</span>
          </div>
          <canvas id="source-canvas" width="512" height="512"></canvas>
        </div>
        <div class="canvas-card panel" id="output-card">
          <div class="canvas-head">
            <strong>Transformed Output</strong>
            <span>Hidden steps + your visible dials</span>
          </div>
          <canvas id="output-canvas" width="512" height="512"></canvas>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
