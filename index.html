<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Projects</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 600px;
      width: 100%;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
    }
    ul {
      list-style: none;
    }
    ul li {
      margin-bottom: 1rem;
    }
    ul li a {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.1rem 1.4rem;
      background: #1a1a22;
      border: 1px solid #2a2a38;
      border-radius: 10px;
      color: #c8c8e0;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }
    ul li a:hover {
      background: #22223a;
      border-color: #4a4a88;
      color: #fff;
      transform: translateX(4px);
    }
    .icon {
      font-size: 1.6rem;
      flex-shrink: 0;
    }
    .label {
      display: flex;
      flex-direction: column;
    }
    .label strong {
      font-size: 1rem;
      font-weight: 600;
    }
    .label span {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.15rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Web Projects</h1>
    <p class="subtitle">A collection of small web experiments</p>
    <ul>
      <li>
        <a href="link-cleaner/index.html">
          <span class="icon">🔗</span>
          <span class="label">
            <strong>Link Cleaner</strong>
            <span>Paste HTML text and auto-replace links with article titles</span>
          </span>
        </a>
      </li>
      <li>
        <a href="substack-reader/index.html">
          <span class="icon">📄</span>
          <span class="label">
            <strong>Substack Reader</strong>
            <span>Extract clean article text from any Substack URL</span>
          </span>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
