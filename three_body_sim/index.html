<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Three-Body Problem</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    #ui {
      position: fixed; top: 16px; left: 16px; pointer-events: none;
      color: rgba(255,255,255,0.65); font-size: 13px; line-height: 1.7;
      text-shadow: 0 0 12px rgba(80,180,255,0.6);
    }
    #ui h1 { font-size: 20px; letter-spacing: 4px; color: #fff; margin-bottom: 2px; }
    #controls {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center;
    }
    button {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.2);
      color: #ccc; padding: 7px 18px; border-radius: 20px; cursor: pointer;
      font: 12px 'Courier New'; letter-spacing: 1px; transition: all 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.18); color: #fff; }
    #speed-label { color: #666; font: 12px 'Courier New'; min-width: 28px; text-align: center; }
  </style>
</head>
<body>
  <div id="ui">
    <h1>3-BODY PROBLEM</h1>
    <div>drag · orbit &nbsp;|&nbsp; scroll · zoom</div>
    <div>auto-rotates slowly</div>
  </div>
  <div id="controls">
    <button id="btn-slower">◀ slower</button>
    <span id="speed-label">1×</span>
    <button id="btn-faster">faster ▶</button>
    <button id="btn-reset">↺ reset</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  // ── Config ──────────────────────────────────────────────────────────────────
  const G           = 1.0;
  const SOFTENING   = 0.05;
  const DT          = 0.003;
  const TRAIL_LEN   = 800;
  const FOG_PTS     = 180;
  const STAR_COUNT  = 3000;

  // Figure-8 orbit (Chenciner & Montgomery 2000) with tiny z-perturbation for 3D chaos
  const IC = [
    { p: [-0.97000436, 0.24308753,  0.04], v: [ 0.46620368,  0.43236573,  0.015], m: 1 },
    { p: [ 0.00000000, 0.00000000, -0.06], v: [-0.93240737, -0.86473146,  0.000], m: 1 },
    { p: [ 0.97000436,-0.24308753,  0.02], v: [ 0.46620368,  0.43236573, -0.015], m: 1 },
  ];

  const COLORS = [
    new THREE.Color(0xff2255),
    new THREE.Color(0x22ff88),
    new THREE.Color(0x44aaff),
  ];
  const HUE_OFFSETS = [0.0, 0.33, 0.67];

  // ── Renderer ────────────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.5;
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.01, 500);
  camera.position.set(0, 2.5, 6.5);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.5;

  // ── Starfield ───────────────────────────────────────────────────────────────
  {
    const pos = new Float32Array(STAR_COUNT * 3);
    const col = new Float32Array(STAR_COUNT * 3);
    for (let i = 0; i < STAR_COUNT; i++) {
      const u = Math.random(), v = Math.random();
      const th = 2 * Math.PI * u, ph = Math.acos(2 * v - 1);
      const r = 70 + Math.random() * 50;
      pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
      pos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
      pos[i*3+2] = r * Math.cos(ph);
      const br = 0.5 + Math.random() * 0.5;
      // slight color tint
      const tint = Math.random();
      col[i*3]   = br * (tint < 0.3 ? 0.8 : 1.0);
      col[i*3+1] = br * (tint < 0.15 ? 0.85 : 1.0);
      col[i*3+2] = br;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
    scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
      vertexColors: true, size: 0.09, sizeAttenuation: true,
    })));
  }

  // ── Shaders ─────────────────────────────────────────────────────────────────
  const TRAIL_VERT = `
    attribute float aSize;
    attribute vec3  aColor;
    varying vec3  vColor;
    varying float vAlpha;
    void main() {
      vColor = aColor;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = aSize * (280.0 / -mv.z);
      vAlpha = smoothstep(0.0, 0.18, aSize);
      gl_Position = projectionMatrix * mv;
    }
  `;
  const TRAIL_FRAG = `
    varying vec3  vColor;
    varying float vAlpha;
    void main() {
      float d = length(gl_PointCoord - 0.5) * 2.0;
      float a = smoothstep(1.0, 0.2, d) * vAlpha;
      if (a < 0.004) discard;
      gl_FragColor = vec4(vColor, a);
    }
  `;

  const SURFACE_VERT = `
    varying vec3 vNorm;
    varying vec3 vView;
    void main() {
      vNorm = normalize(normalMatrix * normal);
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      vView = normalize(-mv.xyz);
      gl_Position = projectionMatrix * mv;
    }
  `;
  const GLOW_FRAG = `
    uniform vec3  uColor;
    uniform float uPow;
    uniform float uStrength;
    varying vec3 vNorm;
    varying vec3 vView;
    void main() {
      float rim = 1.0 - max(dot(vNorm, vView), 0.0);
      float a = pow(rim, uPow) * uStrength;
      gl_FragColor = vec4(uColor, a);
    }
  `;

  // ── Physics ──────────────────────────────────────────────────────────────────
  function makeState() {
    return IC.map(b => ({
      pos:  new THREE.Vector3(...b.p),
      vel:  new THREE.Vector3(...b.v),
      mass: b.m,
    }));
  }

  function accel(state, i) {
    const a = new THREE.Vector3();
    const r = new THREE.Vector3();
    for (let j = 0; j < state.length; j++) {
      if (i === j) continue;
      r.subVectors(state[j].pos, state[i].pos);
      const d2 = r.lengthSq() + SOFTENING * SOFTENING;
      a.addScaledVector(r, G * state[j].mass / (d2 * Math.sqrt(d2)));
    }
    return a;
  }

  function rk4(state, dt) {
    const n = state.length;
    const k1p = state.map(s => s.vel.clone());
    const k1v = state.map((_, i) => accel(state, i));

    const s2 = state.map((s, i) => ({
      pos: s.pos.clone().addScaledVector(k1p[i], dt/2),
      vel: s.vel.clone().addScaledVector(k1v[i], dt/2),
      mass: s.mass,
    }));
    const k2p = s2.map(s => s.vel.clone());
    const k2v = s2.map((_, i) => accel(s2, i));

    const s3 = state.map((s, i) => ({
      pos: s.pos.clone().addScaledVector(k2p[i], dt/2),
      vel: s.vel.clone().addScaledVector(k2v[i], dt/2),
      mass: s.mass,
    }));
    const k3p = s3.map(s => s.vel.clone());
    const k3v = s3.map((_, i) => accel(s3, i));

    const s4 = state.map((s, i) => ({
      pos: s.pos.clone().addScaledVector(k3p[i], dt),
      vel: s.vel.clone().addScaledVector(k3v[i], dt),
      mass: s.mass,
    }));
    const k4p = s4.map(s => s.vel.clone());
    const k4v = s4.map((_, i) => accel(s4, i));

    return state.map((s, i) => ({
      pos: s.pos.clone()
        .addScaledVector(k1p[i], dt/6).addScaledVector(k2p[i], dt/3)
        .addScaledVector(k3p[i], dt/3).addScaledVector(k4p[i], dt/6),
      vel: s.vel.clone()
        .addScaledVector(k1v[i], dt/6).addScaledVector(k2v[i], dt/3)
        .addScaledVector(k3v[i], dt/3).addScaledVector(k4v[i], dt/6),
      mass: s.mass,
    }));
  }

  // ── Planets: core + inner glow + outer atmosphere ────────────────────────────
  const planetMeshes = [], glowMeshes = [], atmMeshes = [], ptLights = [];

  COLORS.forEach((col, i) => {
    // Core
    const core = new THREE.Mesh(
      new THREE.SphereGeometry(0.13, 32, 32),
      new THREE.MeshStandardMaterial({
        color: col, emissive: col, emissiveIntensity: 2.0,
        roughness: 0.2, metalness: 0.6,
      })
    );
    scene.add(core);
    planetMeshes.push(core);

    // Inner glow halo
    const glow = new THREE.Mesh(
      new THREE.SphereGeometry(0.3, 32, 32),
      new THREE.ShaderMaterial({
        uniforms: {
          uColor:    { value: col.clone() },
          uPow:      { value: 2.0 },
          uStrength: { value: 1.6 },
        },
        vertexShader: SURFACE_VERT, fragmentShader: GLOW_FRAG,
        transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
      })
    );
    scene.add(glow);
    glowMeshes.push(glow);

    // Outer atmosphere fog shell (BackSide = inside-out so rim faces inward)
    const atm = new THREE.Mesh(
      new THREE.SphereGeometry(0.75, 32, 32),
      new THREE.ShaderMaterial({
        uniforms: {
          uColor:    { value: col.clone() },
          uPow:      { value: 1.3 },
          uStrength: { value: 0.4 },
        },
        vertexShader: SURFACE_VERT, fragmentShader: GLOW_FRAG,
        transparent: true, side: THREE.BackSide, depthWrite: false,
        blending: THREE.AdditiveBlending,
      })
    );
    scene.add(atm);
    atmMeshes.push(atm);

    // Dynamic colored point light
    const light = new THREE.PointLight(col, 4, 10);
    scene.add(light);
    ptLights.push(light);
  });

  scene.add(new THREE.AmbientLight(0x0a0a22, 1));

  // ── Rainbow trails ───────────────────────────────────────────────────────────
  const trails = COLORS.map((col, i) => {
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(TRAIL_LEN * 3);
    const aColor    = new Float32Array(TRAIL_LEN * 3);
    const aSize     = new Float32Array(TRAIL_LEN);
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('aColor',   new THREE.BufferAttribute(aColor, 3));
    geo.setAttribute('aSize',    new THREE.BufferAttribute(aSize, 1));
    const mat = new THREE.ShaderMaterial({
      vertexShader: TRAIL_VERT, fragmentShader: TRAIL_FRAG,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    });
    scene.add(new THREE.Points(geo, mat));
    return { history: new Array(TRAIL_LEN), head: 0, count: 0, geo, hueBase: HUE_OFFSETS[i] };
  });

  // ── Fog particle clouds ──────────────────────────────────────────────────────
  const fogClouds = COLORS.map((col) => {
    const offsets = new Float32Array(FOG_PTS * 3);
    for (let k = 0; k < FOG_PTS; k++) {
      const th = 2 * Math.PI * Math.random();
      const ph = Math.acos(2 * Math.random() - 1);
      const r  = 0.2 + Math.pow(Math.random(), 0.6) * 0.6;
      offsets[k*3]   = r * Math.sin(ph) * Math.cos(th);
      offsets[k*3+1] = r * Math.sin(ph) * Math.sin(th);
      offsets[k*3+2] = r * Math.cos(ph);
    }
    const pos = new Float32Array(offsets);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mesh = new THREE.Points(geo, new THREE.PointsMaterial({
      color: col, size: 0.045, transparent: true, opacity: 0.45,
      depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true,
    }));
    scene.add(mesh);
    return { mesh, offsets };
  });

  // ── Simulation state ─────────────────────────────────────────────────────────
  let physState = makeState();
  let simTime   = 0;
  let speedMult = 1;

  const speedLabel = document.getElementById('speed-label');
  document.getElementById('btn-faster').onclick = () => {
    speedMult = Math.min(speedMult * 2, 16);
    speedLabel.textContent = speedMult + '×';
  };
  document.getElementById('btn-slower').onclick = () => {
    speedMult = Math.max(speedMult / 2, 0.125);
    speedLabel.textContent = speedMult + '×';
  };
  document.getElementById('btn-reset').onclick = () => {
    physState = makeState();
    simTime   = 0;
    trails.forEach(t => { t.head = 0; t.count = 0; });
  };

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ── Animation loop ────────────────────────────────────────────────────────────
  const tmpColor = new THREE.Color();

  function animate() {
    requestAnimationFrame(animate);

    const steps = Math.max(1, Math.round(speedMult));
    const dt = DT * speedMult / steps;
    for (let s = 0; s < steps; s++) {
      physState = rk4(physState, dt);
      simTime  += dt;
    }

    physState.forEach((body, i) => {
      const p = body.pos;

      // Move planet visuals
      planetMeshes[i].position.copy(p);
      glowMeshes[i].position.copy(p);
      atmMeshes[i].position.copy(p);
      ptLights[i].position.copy(p);

      // Pulse glow intensity with speed
      const speed = body.vel.length();
      glowMeshes[i].material.uniforms.uStrength.value = 1.4 + speed * 0.3;

      // Swirl fog cloud around planet
      const fc  = fogClouds[i];
      const arr = fc.mesh.geometry.attributes.position.array;
      for (let k = 0; k < FOG_PTS; k++) {
        const t = simTime * 0.5 + k * 0.08;
        arr[k*3]   = fc.offsets[k*3]   + 0.07 * Math.sin(t + k * 1.1);
        arr[k*3+1] = fc.offsets[k*3+1] + 0.07 * Math.cos(t * 0.7 + k * 0.9);
        arr[k*3+2] = fc.offsets[k*3+2] + 0.07 * Math.sin(t * 0.4 + k * 1.4);
      }
      fc.mesh.geometry.attributes.position.needsUpdate = true;
      fc.mesh.position.copy(p);

      // Push to ring-buffer trail
      const tr = trails[i];
      tr.history[tr.head] = p.clone();
      tr.head = (tr.head + 1) % TRAIL_LEN;
      if (tr.count < TRAIL_LEN) tr.count++;

      // Update trail geometry (read from ring buffer newest → oldest)
      const posArr  = tr.geo.attributes.position.array;
      const colArr  = tr.geo.attributes.aColor.array;
      const sizeArr = tr.geo.attributes.aSize.array;
      const len     = tr.count;
      for (let k = 0; k < len; k++) {
        const idx = (tr.head - 1 - k + TRAIL_LEN) % TRAIL_LEN;
        const pt  = tr.history[idx];
        posArr[k*3]   = pt.x;
        posArr[k*3+1] = pt.y;
        posArr[k*3+2] = pt.z;

        const tf  = k / TRAIL_LEN;                          // 0=newest 1=oldest
        const hue = (tr.hueBase + simTime * 0.05 - tf * 0.45 + 10) % 1;
        tmpColor.setHSL(hue, 1.0, 0.58 - tf * 0.28);
        colArr[k*3]   = tmpColor.r;
        colArr[k*3+1] = tmpColor.g;
        colArr[k*3+2] = tmpColor.b;
        sizeArr[k] = (1 - tf) * 0.18 + 0.008;
      }
      for (let k = len; k < TRAIL_LEN; k++) sizeArr[k] = 0;
      tr.geo.attributes.position.needsUpdate = true;
      tr.geo.attributes.aColor.needsUpdate   = true;
      tr.geo.attributes.aSize.needsUpdate    = true;
      tr.geo.setDrawRange(0, len);
    });

    controls.update();
    renderer.render(scene, camera);
  }

  animate();
  </script>
</body>
</html>
