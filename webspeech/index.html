<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Dictation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="layout">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Settings</h2>
                <div style="display: flex; gap: 5px;">
                    <button id="saveConfigButton">Save</button>
                </div>
            </div>
            <div class="sidebar-section">
                <label class="sidebar-label">Groq API Key (for Whisper)</label>
                <input type="password" id="groqApiKeyInput" class="sidebar-input" placeholder="gsk_...">
            </div>
            <div class="sidebar-section">
                <label class="sidebar-label">Gemini API Key (for Execute)</label>
                <input type="password" id="geminiApiKeyInput" class="sidebar-input" placeholder="AIza...">
            </div>
            <div class="sidebar-section">
                <label class="sidebar-label">Gemini Model</label>
                <select id="geminiModelSelect" class="sidebar-input">
                    <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite (fastest)</option>
                    <option value="gemini-2.5-flash">gemini-2.5-flash (balanced)</option>
                    <option value="gemini-2.5-pro">gemini-2.5-pro (best quality)</option>
                </select>
            </div>
            <div class="sidebar-section">
                <label class="sidebar-label">Gemini System Prompt</label>
                <textarea id="geminiSystemPromptInput" class="sidebar-textarea" placeholder="System Prompt for Execute…"></textarea>
            </div>
            <div class="sidebar-log-section">
                <label class="sidebar-label">Log</label>
                <textarea id="logBox" class="sidebar-log" readonly></textarea>
            </div>
        </aside>

        <main id="content">
            <div class="main-header">
                <button id="sidebarToggle">☰</button>
                <h2 class="app-title">Voice Dictation</h2>
            </div>

            <div class="editor-container">
                <div class="editor-wrapper">
                    <textarea id="textBox" spellcheck="false" placeholder="Your text will appear here after transcription…"></textarea>
                </div>

                <div class="button-grid">
                    <button id="toggleButton" class="btn-record">Start</button>
                    <button id="processButton" class="btn-action">Process</button>
                    <button id="discardButton" class="btn-danger">Discard</button>
                    <button id="executeButton" class="btn-action">Execute</button>
                    <button id="copyAllButton" class="btn-util">Copy &amp; Clear</button>
                    <button id="editModeButton" class="btn-util">Read Mode</button>
                    <button id="undoButton" class="btn-util">Undo</button>
                    <button id="redoButton" class="btn-util">Redo</button>
                </div>
                <div id="toast" class="toast hidden"></div>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
