<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallel Sokoban</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d1a;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    canvas { display: block; }
    #overlay {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      flex-direction: column;
      z-index: 100;
      background: rgba(10,10,26,0.92);
      backdrop-filter: blur(6px);
    }
    #overlay.show { display: flex; }
    #overlay h1 {
      font-size: 2.4rem; font-weight: 300;
      letter-spacing: 0.12em; margin-bottom: 0.4rem;
    }
    #overlay p { color: #888; font-size: 1rem; margin-bottom: 1.8rem; }
    #overlay .sub { font-size: 0.85rem; color: #555; }
    .won h1 { color: #44ddaa; }
    .died h1 { color: #ff4466; }
    .stage h1 { color: #7799ff; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="overlay">
    <h1 id="ov-title"></h1>
    <p id="ov-sub"></p>
    <div class="sub" id="ov-hint"></div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
