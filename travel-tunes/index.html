<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Tunes — Suitcases & Headphones</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      cursor: none;
    }

    /* ── floor ── */
    #floor {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 120px;
      background: linear-gradient(to top, #1a1030, #0d0d1a);
      border-top: 2px solid #3a2060;
      box-shadow: 0 -20px 60px rgba(90, 40, 180, 0.2);
    }

    /* ── stars ── */
    #stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* ── main SVG stage ── */
    #stage {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── custom cursor ── */
    #cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      border: 2px solid #a78bfa;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.15s, height 0.15s, background 0.15s;
      mix-blend-mode: screen;
    }
    #cursor.active {
      width: 36px;
      height: 36px;
      background: rgba(167, 139, 250, 0.2);
    }

    /* ── UI panel ── */
    #panel {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 10, 40, 0.85);
      border: 1px solid #3a2060;
      border-radius: 16px;
      padding: 12px 28px;
      color: #c4b5fd;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-align: center;
      backdrop-filter: blur(8px);
      pointer-events: none;
      z-index: 100;
    }
    #panel strong { color: #a78bfa; }

    /* ── note particles ── */
    .note {
      position: absolute;
      font-size: 1.4rem;
      opacity: 0;
      pointer-events: none;
      animation: floatNote 1.6s ease-out forwards;
    }
    @keyframes floatNote {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
    }

    /* ── tooltip ── */
    .tip {
      position: absolute;
      background: rgba(20, 10, 40, 0.9);
      border: 1px solid #4c1d95;
      color: #ddd6fe;
      font-size: 0.75rem;
      padding: 5px 10px;
      border-radius: 8px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
      z-index: 50;
    }
    .tip.show { opacity: 1; }

    /* ── suitcase roll animation ── */
    @keyframes roll {
      0%   { transform: translateX(-220px); }
      100% { transform: translateX(calc(100vw + 220px)); }
    }
    .rolling { animation: roll linear infinite; }

    /* ── headphone bob ── */
    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%       { transform: translateY(-18px) rotate(3deg); }
    }

    /* ── glow pulse ── */
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 6px #7c3aed); }
      50%       { filter: drop-shadow(0 0 22px #a78bfa); }
    }

    /* ── wheel spin ── */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── equalizer bars ── */
    .bar { animation: eq 0.6s ease-in-out infinite alternate; }
    .bar:nth-child(2) { animation-delay: 0.1s; }
    .bar:nth-child(3) { animation-delay: 0.2s; }
    .bar:nth-child(4) { animation-delay: 0.15s; }
    .bar:nth-child(5) { animation-delay: 0.05s; }
    @keyframes eq {
      from { transform: scaleY(0.2); }
      to   { transform: scaleY(1); }
    }

    /* ── shimmer on belt ── */
    @keyframes shimmer {
      0%   { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -40; }
    }

    /* ── aurora background ── */
    @keyframes aurora {
      0%,100% { opacity: 0.15; transform: scaleX(1) translateY(0); }
      50%      { opacity: 0.35; transform: scaleX(1.08) translateY(-20px); }
    }

    /* ── rainbow fade ── */
    @keyframes rainbowFade {
      0%,100% { opacity: 0.08; }
      50%      { opacity: 0.22; }
    }
    @keyframes rainbowFade2 {
      0%,100% { opacity: 0.04; }
      50%      { opacity: 0.15; }
    }
  </style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor"></div>

<!-- Info panel -->
<div id="panel">
  Click <strong>suitcases</strong> or <strong>headphones</strong> &nbsp;·&nbsp;
  Hover to inspect &nbsp;·&nbsp;
  <strong>Space</strong> to play/pause
</div>

<!-- Floor -->
<div id="floor"></div>

<!-- Stars canvas -->
<canvas id="stars"></canvas>

<!-- Tooltip -->
<div class="tip" id="tip"></div>

<!-- SVG Stage -->
<svg id="stage" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgAurora" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c1d95" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6d28d9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="spotA" cx="30%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="spotB" cx="75%" cy="65%" r="35%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Suitcase body gradient -->
    <linearGradient id="suitA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="suitB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="suitC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#be185d"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>
    <linearGradient id="suitSmall" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>

    <!-- Headphone cup gradient -->
    <radialGradient id="cupGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <radialGradient id="padGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>

    <!-- Shimmer for straps/belts -->
    <linearGradient id="shimmerG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Belt pattern -->
    <pattern id="beltDash" x="0" y="0" width="20" height="1" patternUnits="userSpaceOnUse">
      <rect width="10" height="1" fill="#a78bfa" opacity="0.6"/>
    </pattern>

    <!-- Clip for cups -->
    <clipPath id="cupClip1"><ellipse cx="0" cy="0" rx="30" ry="34"/></clipPath>
    <clipPath id="cupClip2"><ellipse cx="0" cy="0" rx="30" ry="34"/></clipPath>
  </defs>

  <!-- ── Rainbows ── -->
  <!-- Rainbow 1: large, left-center -->
  <g style="animation: rainbowFade 8s ease-in-out infinite;">
    <path d="M -60 580 A 500 500 0 0 1 1060 580" fill="none" stroke="#ff0000" stroke-width="18" opacity="0.7"/>
    <path d="M -40 580 A 480 480 0 0 1 1040 580" fill="none" stroke="#ff7700" stroke-width="18" opacity="0.7"/>
    <path d="M -20 580 A 460 460 0 0 1 1020 580" fill="none" stroke="#ffee00" stroke-width="18" opacity="0.7"/>
    <path d="M   0 580 A 440 440 0 0 1 1000 580" fill="none" stroke="#00cc44" stroke-width="18" opacity="0.7"/>
    <path d="M  20 580 A 420 420 0 0 1  980 580" fill="none" stroke="#0088ff" stroke-width="18" opacity="0.7"/>
    <path d="M  40 580 A 400 400 0 0 1  960 580" fill="none" stroke="#4400cc" stroke-width="18" opacity="0.7"/>
    <path d="M  60 580 A 380 380 0 0 1  940 580" fill="none" stroke="#aa00ff" stroke-width="18" opacity="0.7"/>
  </g>

  <!-- Rainbow 2: smaller, right side, delayed -->
  <g style="animation: rainbowFade2 11s ease-in-out infinite 3s;">
    <path d="M 700 620 A 280 280 0 0 1 1260 620" fill="none" stroke="#ff0000" stroke-width="12" opacity="0.7"/>
    <path d="M 712 620 A 268 268 0 0 1 1248 620" fill="none" stroke="#ff7700" stroke-width="12" opacity="0.7"/>
    <path d="M 724 620 A 256 256 0 0 1 1236 620" fill="none" stroke="#ffee00" stroke-width="12" opacity="0.7"/>
    <path d="M 736 620 A 244 244 0 0 1 1224 620" fill="none" stroke="#00cc44" stroke-width="12" opacity="0.7"/>
    <path d="M 748 620 A 232 232 0 0 1 1212 620" fill="none" stroke="#0088ff" stroke-width="12" opacity="0.7"/>
    <path d="M 760 620 A 220 220 0 0 1 1200 620" fill="none" stroke="#4400cc" stroke-width="12" opacity="0.7"/>
    <path d="M 772 620 A 208 208 0 0 1 1188 620" fill="none" stroke="#aa00ff" stroke-width="12" opacity="0.7"/>
  </g>

  <!-- Rainbow 3: tiny, left side, different timing -->
  <g style="animation: rainbowFade 13s ease-in-out infinite 6s;">
    <path d="M -200 560 A 200 200 0 0 1 200 560" fill="none" stroke="#ff0000" stroke-width="10" opacity="0.7"/>
    <path d="M -188 560 A 188 188 0 0 1 188 560" fill="none" stroke="#ff7700" stroke-width="10" opacity="0.7"/>
    <path d="M -176 560 A 176 176 0 0 1 176 560" fill="none" stroke="#ffee00" stroke-width="10" opacity="0.7"/>
    <path d="M -164 560 A 164 164 0 0 1 164 560" fill="none" stroke="#00cc44" stroke-width="10" opacity="0.7"/>
    <path d="M -152 560 A 152 152 0 0 1 152 560" fill="none" stroke="#0088ff" stroke-width="10" opacity="0.7"/>
    <path d="M -140 560 A 140 140 0 0 1 140 560" fill="none" stroke="#4400cc" stroke-width="10" opacity="0.7"/>
    <path d="M -128 560 A 128 128 0 0 1 128 560" fill="none" stroke="#aa00ff" stroke-width="10" opacity="0.7"/>
  </g>

  <!-- ── Aurora background blobs ── -->
  <ellipse cx="300" cy="520" rx="320" ry="180" fill="url(#spotA)" style="animation: aurora 7s ease-in-out infinite;"/>
  <ellipse cx="900" cy="500" rx="280" ry="150" fill="url(#spotB)" style="animation: aurora 9s ease-in-out infinite 1s;"/>

  <!-- ── Airport conveyor belt ── -->
  <g id="conveyor">
    <rect x="0" y="590" width="1200" height="28" rx="8" fill="#1e1333" stroke="#3a2060" stroke-width="1.5"/>
    <!-- Moving belt lines -->
    <rect x="0" y="591" width="1200" height="26" rx="7" fill="url(#beltDash)"
          style="stroke-dasharray:20; animation: shimmer 1s linear infinite;"/>
    <!-- Rollers -->
    <circle cx="40"  cy="604" r="8" fill="#2d1f4e" stroke="#4c1d95" stroke-width="1"/>
    <circle cx="120" cy="604" r="8" fill="#2d1f4e" stroke="#4c1d95" stroke-width="1"/>
    <circle cx="200" cy="604" r="8" fill="#2d1f4e" stroke="#4c1d95" stroke-width="1"/>
    <circle cx="280" cy="604" r="8" fill="#2d1f4e" stroke="#4c1d95" stroke-width="1"/>
    <circle cx="360" cy="604" r="8" fill="#2d1f4e" stroke="#4c1d95" stroke-width="1"/>
    <circle cx="440" cy="604" r="8" fill="#2d1f4e" stroke="#4c1d95" stroke-width="1"/>
    <circle cx="520" cy="604" r="8" fill="#2d1f4e" stroke="#4c1d95" stroke-width="1"/>
    <circle cx="600" cy="604" r="8" fill="#2d1f4e" stroke="#4c1d95" stroke-width="1"/>
    <circle cx="680" cy="604" r="8" fill="#2d1f4e" stroke="#4c1d95" stroke-width="1"/>
    <circle cx="760" cy="604" r="8" fill="#2d1f4e" stroke="#4c1d95" stroke-width="1"/>
    <circle cx="840" cy="604" r="8" fill="#2d1f4e" stroke="#4c1d95" stroke-width="1"/>
    <circle cx="920" cy="604" r="8" fill="#2d1f4e" stroke="#4c1d95" stroke-width="1"/>
    <circle cx="1000" cy="604" r="8" fill="#2d1f4e" stroke="#4c1d95" stroke-width="1"/>
    <circle cx="1080" cy="604" r="8" fill="#2d1f4e" stroke="#4c1d95" stroke-width="1"/>
    <circle cx="1160" cy="604" r="8" fill="#2d1f4e" stroke="#4c1d95" stroke-width="1"/>
    <text x="600" y="627" text-anchor="middle" fill="#6d28d9" font-size="10" opacity="0.5" letter-spacing="8">
      ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸ ▸
    </text>
  </g>

  <!-- ═══════════════════════════════════════════
       SUITCASE A — Large purple, rolling (belt)
       ═══════════════════════════════════════════ -->
  <g class="rolling suitcase" id="suitA"
     data-label="Carry-on Deluxe · click me!"
     style="animation-duration:9s; animation-delay:0s;"
     transform="translate(0,0)">
    <g transform="translate(200,560)" filter="url(#shadow)">
      <!-- Body -->
      <rect x="-55" y="-120" width="110" height="130" rx="10" fill="url(#suitA)" stroke="#7c3aed" stroke-width="2"/>
      <!-- Shine -->
      <rect x="-48" y="-112" width="30" height="60" rx="6" fill="white" opacity="0.07"/>
      <!-- Belt strap horizontal -->
      <rect x="-55" y="-52" width="110" height="9" rx="2" fill="#4c1d95" stroke="#7c3aed" stroke-width="1"/>
      <rect x="-55" y="-35" width="110" height="9" rx="2" fill="#4c1d95" stroke="#7c3aed" stroke-width="1"/>
      <!-- Belt buckle -->

      <rect x="-4" y="-52" width="8" height="9" rx="2" fill="none" stroke="#c4b5fd" stroke-width="1"/>
      <!-- Handle -->
      <rect x="-18" y="-142" width="36" height="28" rx="6" fill="none" stroke="#7c3aed" stroke-width="3.5"/>

      <!-- Tag -->
      <rect x="28" y="-105" width="24" height="16" rx="3" fill="#a78bfa" opacity="0.9"/>
      <line x1="52" y1="-97" x2="60" y2="-90" stroke="#a78bfa" stroke-width="1.5"/>
      <!-- Logo sticker -->

      <text x="-25" y="-71" text-anchor="middle" font-size="10" fill="#e9d5ff">♪</text>
      <!-- Wheels -->
      <g id="wheelA1" style="transform-origin:-35px 14px; animation: spin 0.5s linear infinite;">
        <circle cx="-35" cy="14" r="10" fill="#1f1535" stroke="#7c3aed" stroke-width="2"/>
        <circle cx="-35" cy="14" r="4" fill="#7c3aed"/>
        <line x1="-35" y1="4" x2="-35" y2="24" stroke="#4c1d95" stroke-width="1.5"/>
        <line x1="-45" y1="14" x2="-25" y2="14" stroke="#4c1d95" stroke-width="1.5"/>
      </g>
      <g style="transform-origin:35px 14px; animation: spin 0.5s linear infinite;">
        <circle cx="35" cy="14" r="10" fill="#1f1535" stroke="#7c3aed" stroke-width="2"/>
        <circle cx="35" cy="14" r="4" fill="#7c3aed"/>
        <line x1="35" y1="4" x2="35" y2="24" stroke="#4c1d95" stroke-width="1.5"/>
        <line x1="25" y1="14" x2="45" y2="14" stroke="#4c1d95" stroke-width="1.5"/>
      </g>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════
       SUITCASE B — Medium blue, rolling (belt)
       ═══════════════════════════════════════════ -->
  <g class="rolling suitcase" id="suitB"
     data-label="Explorer Pro · click me!"
     style="animation-duration:12s; animation-delay:-4s;">
    <g transform="translate(200,568)" filter="url(#shadow)">
      <rect x="-46" y="-98" width="92" height="108" rx="9" fill="url(#suitB)" stroke="#2563eb" stroke-width="2"/>

       SUITCASE C — Pink, rolling (belt)
       ═══════════════════════════════════════════ -->

     data-label="Glamour Glide · click me!"
     style="animation-duration:7s; animation-delay:-2s;">
    <g transform="translate(200,572)" filter="url(#shadow)">
      <rect x="-38" y="-80" width="76" height="90" rx="8" fill="url(#suitC)" stroke="#ec4899" stroke-width="2"/>

      </g>
      <g style="transform-origin:22px 12px; animation: spin 0.35s linear infinite;">
        <circle cx="22" cy="12" r="7" fill="#0f0f1a" stroke="#ec4899" stroke-width="2"/>
        <circle cx="22" cy="12" r="3" fill="#ec4899"/>
        <line x1="22" y1="5" x2="22" y2="19" stroke="#9d174d" stroke-width="1.5"/>
        <line x1="15" y1="12" x2="29" y2="12" stroke="#9d174d" stroke-width="1.5"/>
      </g>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════
       SUITCASE D — Green small, rolling (belt)
       ═══════════════════════════════════════════ -->
  <g class="rolling suitcase" id="suitD"
     data-label="Mini Verde · click me!"
     style="animation-duration:14s; animation-delay:-7s;">
    <g transform="translate(200,576)" filter="url(#shadow)">
      <rect x="-30" y="-62" width="60" height="72" rx="7" fill="url(#suitSmall)" stroke="#10b981" stroke-width="2"/>
      <rect x="-24" y="-55" width="14" height="28" rx="3" fill="white" opacity="0.06"/>

  <ellipse id="hitHpC" cx="980" cy="220" rx="110" ry="110" fill="transparent" style="cursor:pointer;" data-hp="C"/>

<script>
  // ── Stars ──────────────────────────────────────────────────────────────────
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const stars = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height * 0.75,
    r: Math.random() * 1.5 + 0.3,
    a: Math.random(),
    speed: Math.random() * 0.008 + 0.002,
    phase: Math.random() * Math.PI * 2,
  }));

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = 0.3 + 0.5 * Math.sin(s.phase + t * s.speed);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,180,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  drawStars(0);

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  // ── Custom cursor ──────────────────────────────────────────────────────────
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });
  document.addEventListener('mousedown', () => cursor.classList.add('active'));
  document.addEventListener('mouseup',   () => cursor.classList.remove('active'));

  // ── Pause / Play ───────────────────────────────────────────────────────────
  let paused = false;
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      paused = !paused;
      const all = document.querySelectorAll('[style*="animation"]');
      all.forEach(el => {
        el.style.animationPlayState = paused ? 'paused' : 'running';
      });
      document.querySelectorAll('.bar').forEach(b => {
        b.style.animationPlayState = paused ? 'paused' : 'running';
      });
    }
  });

  // ── Tooltip ────────────────────────────────────────────────────────────────
  const tip = document.getElementById('tip');
  function showTip(text, x, y) {
    tip.textContent = text;
    tip.style.left = (x + 16) + 'px';
    tip.style.top  = (y - 10) + 'px';
    tip.classList.add('show');
  }
  function hideTip() { tip.classList.remove('show'); }

  // hover on all clickables
  const interactibles = document.querySelectorAll('.suitcase, .headphone');
  interactibles.forEach(el => {
    el.style.cursor = 'pointer';
    el.addEventListener('mouseenter', e => {
      const label = el.getAttribute('data-label');
      if (label) showTip(label, e.clientX, e.clientY);
    });
    el.addEventListener('mousemove', e => {
      tip.style.left = (e.clientX + 16) + 'px';
      tip.style.top  = (e.clientY - 10) + 'px';
    });
    el.addEventListener('mouseleave', hideTip);
  });

  // ── Note burst on click ────────────────────────────────────────────────────
  const notes = ['♩','♪','♫','♬','🎵','🎶'];

  function burstNotes(x, y, count = 5) {
    for (let i = 0; i < count; i++) {
      const n = document.createElement('div');
      n.className = 'note';
      n.textContent = notes[Math.floor(Math.random() * notes.length)];
      const offX = (Math.random() - 0.5) * 80;
      n.style.left = (x + offX) + 'px';
      n.style.top  = y + 'px';
      n.style.color = `hsl(${260 + Math.random()*60},80%,70%)`;
      n.style.animationDelay = (Math.random() * 0.3) + 's';
      document.body.appendChild(n);
      setTimeout(() => n.remove(), 2000);
    }
  }

  // ── Suitcase click — speed burst ──────────────────────────────────────────
  document.querySelectorAll('.suitcase').forEach(el => {
    el.addEventListener('click', e => {
      burstNotes(e.clientX, e.clientY, 6);
      const orig = el.style.animationDuration;
      el.style.animationDuration = (parseFloat(orig) * 0.4) + 's';
      setTimeout(() => { el.style.animationDuration = orig; }, 1500);
    });
  });

  // ── Headphone click — spin cup + note burst ────────────────────────────────
  document.querySelectorAll('.headphone').forEach(el => {
    el.addEventListener('click', e => {
      burstNotes(e.clientX, e.clientY, 8);
      // Temporarily boost glow
      el.style.filter = 'drop-shadow(0 0 30px #a78bfa)';
      setTimeout(() => { el.style.filter = ''; }, 600);
    });
  });

  // ── Global click note ─────────────────────────────────────────────────────
  document.addEventListener('click', e => {
    if (Math.random() < 0.3) {
      const n = document.createElement('div');
      n.className = 'note';
      n.textContent = notes[Math.floor(Math.random() * notes.length)];
      n.style.left = e.clientX + 'px';
      n.style.top  = e.clientY + 'px';
      n.style.color = `hsl(${270 + Math.random()*40},70%,75%)`;
      document.body.appendChild(n);
      setTimeout(() => n.remove(), 2000);
    }
  });

  // ── Parallax mouse effect on headphones ───────────────────────────────────
  const hpA = document.getElementById('hpA');
  const hpB = document.getElementById('hpB');
  const hpC = document.getElementById('hpC');

  document.addEventListener('mousemove', e => {
    const cx = window.innerWidth  / 2;
    const cy = window.innerHeight / 2;
    const dx = (e.clientX - cx) / cx;
    const dy = (e.clientY - cy) / cy;
    hpA.style.transform = `translate(${600 + dx * 12}px,${280 + dy * 8}px)`;
    hpB.style.transform = `translate(${200 + dx * 6}px,${200 + dy * 5}px)`;
    hpC.style.transform = `translate(${980 + dx * 8}px,${220 + dy * 6}px)`;
  });
</script>
